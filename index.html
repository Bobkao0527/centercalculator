<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中樞運算機關</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000205; 
            font-family: 'Segoe UI', 'Microsoft JhengHei', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            box-shadow: inset 0 0 150px rgba(0, 150, 255, 0.1);
            z-index: 10;
        }

        .main-header {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: auto;
        }

        .main-title {
            color: #88eaff;
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: 12px;
            text-transform: uppercase;
            text-shadow: 
                0 0 10px rgba(136, 234, 255, 0.5),
                0 0 20px rgba(136, 234, 255, 0.3),
                0 0 40px rgba(255, 170, 0, 0.2);
            position: relative;
            padding: 10px 40px;
        }

        .main-title::before, .main-title::after {
            content: '';
            position: absolute;
            width: 60px;
            height: 2px;
            background: #88eaff;
            top: 50%;
            box-shadow: 0 0 10px #88eaff;
        }
        .main-title::before { left: -30px; }
        .main-title::after { right: -30px; }

        .hud-text {
            position: absolute;
            color: rgba(100, 200, 255, 0.6);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #top-left { top: 30px; left: 40px; border-left: 2px solid rgba(0, 180, 255, 0.5); padding-left: 10px;}
        #bottom-right { bottom: 30px; right: 40px; text-align: right; border-right: 2px solid rgba(255, 200, 0, 0.5); padding-right: 10px;}
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="main-header">
            <h1 class="main-title">中樞運算機關</h1>
        </div>

        <div class="hud-text" id="top-left">
            SYS.CORE_V3.0<br>
            <span style="font-size: 10px; color: rgba(255,200,100,0.6);">HYBRID ENERGY FLOW: ACTIVE</span>
        </div>
        <div class="hud-text" id="bottom-right">
            GOLDEN SCAN: SYNCED<br>
            <span style="font-size: 10px; color: rgba(100,200,255,0.5);">CHRONOS DATA UPLINK</span>
        </div>
    </div>
    
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ==========================================
        // 1. 初始化
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000205, 0.045); 

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 14);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // ==========================================
        // 2. 高密度電路板紋理 (完全保留 V2.5 邏輯)
        // ==========================================
        function createCircuitTexture(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, size, size);
            ctx.lineWidth = 2;
            ctx.lineCap = 'square';

            // 背景微塵
            ctx.fillStyle = '#112233';
            for(let x=0; x<size; x+=8) {
                for(let y=0; y<size; y+=8) {
                    if(Math.random() > 0.7) ctx.fillRect(x-1, y-1, 2, 2);
                }
            }

            // 主電路路徑
            ctx.strokeStyle = '#ffffff'; 
            for(let i=0; i<150; i++) {
                ctx.beginPath();
                let x = Math.floor(Math.random() * (size/16)) * 16;
                let y = Math.floor(Math.random() * (size/16)) * 16;
                ctx.moveTo(x, y);
                const segments = Math.floor(Math.random() * 6) + 3;
                for(let j=0; j<segments; j++) {
                    const dir = Math.random();
                    const length = (Math.floor(Math.random() * 5) + 2) * 16;
                    if(dir < 0.25) x += length;
                    else if(dir < 0.5) x -= length;
                    else if(dir < 0.75) y += length;
                    else y -= length;
                    x = Math.max(0, Math.min(size, x));
                    y = Math.max(0, Math.min(size, y));
                    ctx.lineTo(x, y);
                }
                ctx.stroke();
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(x-2, y-2, 4, 4);
            }

            // 芯片與組件塊
            for(let i=0; i<40; i++) {
                let x = Math.floor(Math.random() * (size/16)) * 16;
                let y = Math.floor(Math.random() * (size/16)) * 16;
                let bw = (Math.floor(Math.random() * 4) + 2) * 16;
                let bh = (Math.floor(Math.random() * 3) + 1) * 16;
                ctx.strokeStyle = '#446688';
                ctx.strokeRect(x, y, bw, bh);
                ctx.fillStyle = '#5588aa';
                for(let j=4; j<bh-4; j+=6) if(Math.random() > 0.3) ctx.fillRect(x+4, y+j, bw-8, 2);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        const circuitTexture = createCircuitTexture(1024);

        // ==========================================
        // 3. Shader 材質 (修復金色掃線)
        // ==========================================
        const baseVertexShader = `
            varying vec2 vUv;
            varying vec3 vWorldPosition;
            void main() {
                vUv = uv;
                vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                vWorldPosition = worldPosition.xyz;
                gl_Position = projectionMatrix * viewMatrix * worldPosition;
            }
        `;

        const cubeFragmentShader = `
            uniform float time;
            uniform sampler2D map;
            uniform vec3 colorBase;
            uniform vec3 colorLine;
            uniform vec3 colorGlow;
            uniform vec3 colorGold; // 引入金色
            varying vec2 vUv;
            void main() {
                vec4 texColor = texture2D(map, vUv);
                float mask = texColor.r; 
                
                // 金色斜向流動邏輯 (vUv.x + vUv.y 控制斜向)
                float flow = fract(vUv.x + vUv.y - time * 0.4);
                float pulse = smoothstep(0.0, 0.15, flow) * smoothstep(0.3, 0.15, flow);
                
                // 邊緣輝光
                float edgeGlow = smoothstep(0.4, 0.5, abs(vUv.x - 0.5)) + smoothstep(0.4, 0.5, abs(vUv.y - 0.5));
                
                // 顏色分層：
                // 1. 藍色電路底色
                // 2. 當 pulse 觸發時，混合出金黃色 (colorGold)
                vec3 lineFinal = mix(colorLine, colorGold, pulse * 5.0); 
                
                vec3 finalColor = mix(colorBase, lineFinal, mask);
                
                // 增加金色流光的額外發光感
                finalColor += colorGold * pulse * mask * 1.5;
                
                // 疊加邊緣藍光 (維持科技氛圍)
                finalColor += colorGlow * edgeGlow * 0.8;
                
                gl_FragColor = vec4(finalColor * 1.3, 0.95);
            }
        `;

        const floorFragmentShader = `
            uniform float time;
            uniform sampler2D map;
            uniform vec3 colorBase;
            uniform vec3 colorLine;
            uniform vec3 colorGlow;
            uniform vec3 colorGold;
            uniform vec3 cameraPos;
            varying vec2 vUv;
            varying vec3 vWorldPosition;
            void main() {
                vec2 uv = vUv * 18.0;
                vec4 texColor = texture2D(map, uv);
                float mask = texColor.r;
                
                // 地面同步金色流光
                float flow = fract(uv.x + uv.y - time * 0.3);
                float pulse = smoothstep(0.0, 0.1, flow) * smoothstep(0.2, 0.1, flow);
                
                float dist = distance(vWorldPosition, cameraPos);
                float fade = smoothstep(45.0, 15.0, dist); 
                
                // 基礎藍線與金色掃線混合
                vec3 currentLine = mix(colorLine, colorGold, pulse * 3.0);
                vec3 finalColor = mix(colorBase, currentLine, mask);
                
                gl_FragColor = vec4(finalColor * fade * 1.5, 1.0);
            }
        `;

        const commonUniforms = {
            time: { value: 0 },
            map: { value: circuitTexture },
            colorBase: { value: new THREE.Color(0x001a3d) },
            colorLine: { value: new THREE.Color(0x0088ff) },
            colorGlow: { value: new THREE.Color(0x88eaff) },
            colorGold: { value: new THREE.Color(0xffaa00) } // 明亮的琥珀金
        };

        const cubeMaterial = new THREE.ShaderMaterial({
            uniforms: commonUniforms,
            vertexShader: baseVertexShader,
            fragmentShader: cubeFragmentShader,
            transparent: true
        });

        // ==========================================
        // 4. 物件構建
        // ==========================================
        const cubeGroup = new THREE.Group();
        cubeGroup.position.y = 1.5;
        scene.add(cubeGroup);

        const cube = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), cubeMaterial);
        cubeGroup.add(cube);

        const edges = new THREE.LineSegments(
            new THREE.EdgesGeometry(cube.geometry),
            new THREE.LineBasicMaterial({ color: 0x88eaff, transparent: true, opacity: 0.6 })
        );
        edges.scale.set(1.01, 1.01, 1.01);
        cubeGroup.add(edges);

        const floorMat = new THREE.ShaderMaterial({
            uniforms: {
                ...commonUniforms,
                colorBase: { value: new THREE.Color(0x000205) },
                cameraPos: { value: camera.position }
            },
            vertexShader: baseVertexShader,
            fragmentShader: floorFragmentShader
        });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -2.5;
        scene.add(floor);

        // --- 向上飄動的數據流系統 ---
        const streams = [];
        for(let i = 0; i < 40; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 0.5 + Math.random() * 1.5;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            
            const lineMat = new THREE.LineBasicMaterial({ 
                color: 0x88eaff, 
                transparent: true, 
                opacity: 0.8,
                blending: THREE.AdditiveBlending 
            });
            const line = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0.6, 0)]),
                lineMat
            );
            line.position.set(x, -2.5, z);
            scene.add(line);
            streams.push({ mesh: line, speed: 0.03 + Math.random() * 0.05, offset: Math.random() * 100 });
        }

        const particlesGeo = new THREE.BufferGeometry();
        const pCount = 500;
        const pPos = new Float32Array(pCount * 3);
        for(let i=0; i<pCount*3; i++) pPos[i] = (Math.random()-0.5)*30;
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        const particles = new THREE.Points(particlesGeo, new THREE.PointsMaterial({ size: 0.06, color: 0x88eaff, transparent: true, blending: THREE.AdditiveBlending }));
        scene.add(particles);

        // ==========================================
        // 5. 燈光與動畫 (掛鉤絕對時間)
        // ==========================================
        scene.add(new THREE.AmbientLight(0x0055aa, 0.8));
        const pLight = new THREE.PointLight(0x88eaff, 5, 20);
        cubeGroup.add(pLight);

        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', e => {
            mouseX = (e.clientX - window.innerWidth / 2) * 0.005;
            mouseY = (e.clientY - window.innerHeight / 2) * 0.005;
        });

        function animate() {
            requestAnimationFrame(animate);
            const now = Date.now() / 1000; 
            commonUniforms.time.value = now;
            floorMat.uniforms.cameraPos.value.copy(camera.position);

            cubeGroup.rotation.y = now * 0.36;
            cubeGroup.rotation.x = now * 0.18 + Math.sin(now * 0.5) * 0.15;
            const cubeBaseY = 1.5 + Math.sin(now * 1.2) * 0.3;
            cubeGroup.position.y = cubeBaseY;

            streams.forEach(s => {
                const cycle = 7.5;
                const progress = (now * s.speed * 20 + s.offset) % cycle;
                s.mesh.position.y = -2.5 + progress;
                const distToCube = s.mesh.position.y - cubeBaseY;
                s.mesh.material.opacity = (distToCube > -1.5 && distToCube < 0.5) ? 0.2 : 0.8;
                // 數據流閃爍金色
                s.mesh.material.color.set(Math.sin(now + s.offset) > 0.85 ? 0xffaa00 : 0x88eaff);
            });

            const p = particles.geometry.attributes.position.array;
            for(let i=1; i<pCount*3; i+=3) {
                const pIdx = i / 3;
                p[i] = -5 + ((now * 1.5 + pIdx * 0.2) % 15);
            }
            particles.geometry.attributes.position.needsUpdate = true;

            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY + 4 - camera.position.y) * 0.05;
            camera.lookAt(0, 1, 0);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
